name: ebalistyka
version: '0.1.9'
summary: Ballistic calculator
description: |
  eBalistyka is a professional ballistic calculator for shooters.
  Supports trajectory calculation, wind drift, multiple ammo profiles,
  and custom reticle overlays.

confinement: strict
base: core22
grade: stable

lint:
  ignore:
    - library

apps:
  ebalistyka:
    command: ebalistyka
    plugs:
      - network
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  ebalistyka:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    flutter-channel: stable
    build-packages:
      - clang
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - lld
      - llvm
    stage-packages:
      - libgtk-3-0
      - libglib2.0-0
      - libgdk-pixbuf2.0-0
      - libpango-1.0-0
      - libcairo2
      - libatk1.0-0
      - libepoxy0
      - libdbus-1-3
      - libstdc++6
