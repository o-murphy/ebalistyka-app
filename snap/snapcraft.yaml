name: ebalistyka
version: '0.1.9-dev'
summary: Ballistic calculator
description: |
  eBalistyka is a professional ballistic calculator for shooters.
  Supports trajectory calculation, wind drift, multiple ammo profiles,
  and custom reticle overlays.

confinement: strict
base: core22
grade: devel

lint:
  ignore:
    - library

apps:
  ebalistyka:
    command: ebalistyka
    extensions: [gnome]
    plugs:
      - network
      - home

parts:
  ebalistyka:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    flutter-channel: stable
    build-packages:
      - clang
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - lld
      - llvm
    stage-packages:
      - libstdc++6
