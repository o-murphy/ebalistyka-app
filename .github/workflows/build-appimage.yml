name: PR Build (Linux AppImage)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "lib/**"
      - "linux/**"
      - "external/**"
      - "packages/bclibc_ffi/**"
      - "pubspec.yaml"
      - ".github/workflows/build-appimage.yml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Linux amd64 (release)
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: amd64
      build_type: release
      build_name: '0.1.0-alpha'
      retention_days: 30

  pr-summary:
    name: PR Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const success = '${{ needs.build.result }}' === 'success';
            const artifactUrl = '${{ needs.build.outputs.artifact_url }}';
            const artifactName = '${{ needs.build.outputs.artifact_name }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## Linux AppImage Build\n\n`;
            if (success) {
              body += `✅ **Build successful!**\n\n`;
              body += `📦 **[Download AppImage](${artifactUrl})**\n`;
              body += `\`${artifactName}\` — available for 7 days\n\n`;
              body += `**PR**: #${prNumber} · **Commit**: \`${{ github.sha }}\`\n\n`;
              body += `### Test Instructions:\n`;
              body += `\`\`\`bash\n# Download and run\nchmod +x ebalistyka-x86_64.AppImage\n./ebalistyka-x86_64.AppImage\n\n# Check if bclibc_ffi is loaded correctly\nldd ebalistyka-x86_64.AppImage | grep bclibc\n\`\`\`\n`;
              body += `\n**Note**: Make sure the bclibc_ffi package is properly linked.\n`;
            } else {
              body += `❌ **Build failed!**\n\n`;
              body += `[View logs](${runUrl})\n\n`;
              body += `**Common issues:**\n`;
              body += `- Check if bclibc_ffi CMakeLists.txt has correct paths\n`;
              body += `- Verify external/bclibc submodule is initialized\n`;
              body += `- Run \`git submodule update --init --recursive\`\n`;
            }

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('## Linux AppImage Build')
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (error) {
              console.log('Error posting comment:', error.message);
            }

      - name: Display build status
        if: steps.pr.outputs.number == ''
        run: |
          echo "Build completed with status: ${{ needs.build.result }}"
          echo "Skipping PR comment because this is not a pull request event"
