name: Build Linux AppImage + Portable

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "lib/**"
      - "linux/**"
      - "external/**"
      - "packages/bclibc_ffi/**"
      - "pubspec.yaml"
      - ".github/workflows/build-appimage.yml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: build-appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        uses: ./.github/actions/version

  build-amd64:
    needs: prepare-version
    name: Linux amd64 (release)
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: amd64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 30

  build-arm64:
    needs: prepare-version
    name: Linux arm64 (release)
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: arm64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 30

  pr-summary-amd64:
    needs: [ build-amd64 ]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    uses: ./.github/workflows/pr-summary.yml
    with:
      platform: Linux amd64
      build_result: ${{ needs.build-amd64.result }}
      artifact_name: ${{ needs.build-amd64.outputs.artifact_name }}
      artifact_url: ${{ needs.build-amd64.outputs.artifact_url }}

  pr-summary-arm64:
    needs: [ build-arm64 ]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    uses: ./.github/workflows/pr-summary.yml
    with:
      platform: Linux arm64
      build_result: ${{ needs.build-arm64.result }}
      artifact_name: ${{ needs.build-arm64.outputs.artifact_name }}
      artifact_url: ${{ needs.build-arm64.outputs.artifact_url }}
