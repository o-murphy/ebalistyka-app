name: PR Build (Windows EXE)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/**'
      - 'windows/**'
      - 'external/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-exe.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Windows amd64 (debug)
    uses: ./.github/workflows/build.yml
    with:
      platform: windows
      arch: amd64
      build_type: release
      retention_days: 7

  pr-summary:
    name: PR Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.build.result }}' === 'success';
            const artifactUrl = '${{ needs.build.outputs.artifact_url }}';
            const artifactName = '${{ needs.build.outputs.artifact_name }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## Windows EXE Build\n\n`;
            if (success) {
              body += `✅ **Build successful!** (debug)\n\n`;
              body += `📦 **[Download EXE](${artifactUrl})**\n`;
              body += `\`${artifactName}\` — available for 7 days\n\n`;
              body += `**PR**: #${{ github.event.pull_request.number }} · **Commit**: \`${{ github.sha }}\`\n`;
            } else {
              body += `❌ **Build failed!**\n\n[View logs](${runUrl})\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Windows EXE Build')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
