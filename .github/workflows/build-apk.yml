name: PR Build (Android APK)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "lib/**"
      - "android/**"
      - "external/**"
      - "packages/bclibc_ffi/**"
      - "pubspec.yaml"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        uses: ./.github/actions/version

  build:
    needs: prepare-version
    name: Android fat APK (release)
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_url: ${{ steps.artifact_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: ./.github/actions/flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          BUILD_NAME="${{ needs.prepare-version.outputs.version }}"
          BUILD_NAME="${BUILD_NAME#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          BCLIBC_HASH=$(git -C external/bclibc rev-parse HEAD)
          BCLIBC_FFI_HASH=$(git log -1 --format='%H' -- packages/bclibc_ffi 2>/dev/null || echo "unknown")
          echo "build_name=$BUILD_NAME"         >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER"     >> $GITHUB_OUTPUT
          echo "bclibc_hash=$BCLIBC_HASH"       >> $GITHUB_OUTPUT
          echo "bclibc_ffi_hash=$BCLIBC_FFI_HASH" >> $GITHUB_OUTPUT
          echo "artifact_name=ebalistyka-android-release-${BUILD_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pub-cache
          key: pub-android-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache bclibc NDK build
        uses: actions/cache@v4
        with:
          path: packages/bclibc_ffi/android/.cxx
          key: bclibc-android-${{ steps.meta.outputs.bclibc_hash }}-${{ steps.meta.outputs.bclibc_ffi_hash }}
          restore-keys: |
            bclibc-android-${{ steps.meta.outputs.bclibc_hash }}-
            bclibc-android-

      - name: Install Flutter dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Set pubspec version
        run: |
          BASE=$(echo "${{ steps.meta.outputs.build_name }}" | sed 's/-.*//')
          NUM=${{ steps.meta.outputs.build_number }}
          sed -i "s/^version:.*/version: ${BASE}+${NUM}/" pubspec.yaml
          echo "pubspec version → ${BASE}+${NUM}"

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Package APKs
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  artifacts/ebalistyka_android_arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/ebalistyka_android_armeabi_v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     artifacts/ebalistyka_android_x86_64.apk

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Generate artifact URL
        id: artifact_url
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts" >> $GITHUB_OUTPUT

  pr-summary:
    name: PR Build Summary
    runs-on: ubuntu-latest
    needs: [ build ]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const success = '${{ needs.build.result }}' === 'success';
            const artifactUrl = '${{ needs.build.outputs.artifact_url }}';
            const artifactName = '${{ needs.build.outputs.artifact_name }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## Android APK Build\n\n`;

            if (success) {
              body += `✅ **Build successful!**\n\n`;
              if (artifactUrl) {
                body += `📦 **[Download APK](${artifactUrl})**\n`;
                body += `\`${artifactName}\` — available for 30 days\n\n`;
              }
              body += `**PR**: #${prNumber} · **Commit**: \`${{ github.sha }}\`\n\n`;
              body += `### Test Instructions:\n`;
              body += `\`\`\`bash\n# arm64 (most modern phones)\nadb install ebalistyka_android_arm64.apk\n# arm32 (older phones)\nadb install ebalistyka_android_armeabi_v7a.apk\n\`\`\`\n`;
            } else {
              body += `❌ **Build failed!**\n\n[View logs](${runUrl})\n`;
            }

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('## Android APK Build')
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (error) {
              console.log('Error posting comment:', error.message);
            }
