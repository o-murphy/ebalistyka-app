name: Build Android APK

on:
  workflow_call:
    inputs:
      build_name:
        description: "Version name (e.g. v1.2.3 or 0.1.0-dev)"
        required: false
        type: string
        default: "0.1.0-dev"
      build_type:
        description: "Build type"
        required: false
        type: string
        default: "release"
      retention_days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 30
    secrets:
      ANDROID_KEYSTORE_BASE64:
        description: "Base64-encoded Android keystore (.jks / .p12)"
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        description: "Keystore store password"
        required: false
      ANDROID_KEY_ALIAS:
        description: "Key alias inside the keystore"
        required: false
      ANDROID_KEY_PASSWORD:
        description: "Key password"
        required: false
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_url:
        description: "URL to the artifact"
        value: ${{ jobs.build.outputs.artifact_url }}

  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (e.g. 0.1.0-dev)"
        required: false
        default: "0.1.0-dev"
        type: string
      build_type:
        description: "Build type"
        required: false
        default: "release"
        type: choice
        options: [ release, debug ]

  pull_request:
    branches: [ main, develop ]
    paths:
      - "lib/**"
      - "android/**"
      - "external/**"
      - "packages/bclibc_ffi/**"
      - "pubspec.yaml"
      - "scripts/build-android.sh"
      - ".github/workflows/build-apk.yml"

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  build:
    name: Android APK (${{ inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_url:  ${{ steps.artifact_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: ./.github/actions/flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          BUILD_NAME="${{ inputs.build_name || '0.1.0-dev' }}"
          BUILD_NAME="${BUILD_NAME#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          BCLIBC_HASH=$(git -C external/bclibc rev-parse HEAD)
          BCLIBC_FFI_HASH=$(git log -1 --format='%H' -- packages/bclibc_ffi 2>/dev/null || echo "unknown")
          echo "build_name=$BUILD_NAME"           >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER"       >> $GITHUB_OUTPUT
          echo "bclibc_hash=$BCLIBC_HASH"         >> $GITHUB_OUTPUT
          echo "bclibc_ffi_hash=$BCLIBC_FFI_HASH" >> $GITHUB_OUTPUT
          echo "artifact_name=ebalistyka-android-${{ inputs.build_type || 'release' }}-${BUILD_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pub-cache
          key: pub-android-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache bclibc NDK build
        uses: actions/cache@v4
        with:
          path: packages/bclibc_ffi/android/.cxx
          key: bclibc-android-${{ steps.meta.outputs.bclibc_hash }}-${{ steps.meta.outputs.bclibc_ffi_hash }}
          restore-keys: |
            bclibc-android-${{ steps.meta.outputs.bclibc_hash }}-
            bclibc-android-

      - name: Install Flutter dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build & sign APKs
        env:
          ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash scripts/build-android.sh \
            "${{ steps.meta.outputs.build_name }}" \
            "${{ steps.meta.outputs.build_number }}"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          retention-days: ${{ inputs.retention_days || 30 }}
          if-no-files-found: error

      - name: Generate artifact URL
        id: artifact_url
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts" >> $GITHUB_OUTPUT

  pr-summary:
    name: PR Build Summary
    runs-on: ubuntu-latest
    needs: [ build ]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const success = '${{ needs.build.result }}' === 'success';
            const artifactUrl = '${{ needs.build.outputs.artifact_url }}';
            const artifactName = '${{ needs.build.outputs.artifact_name }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## Android APK Build\n\n`;

            if (success) {
              body += `✅ **Build successful!**\n\n`;
              if (artifactUrl) {
                body += `📦 **[Download APK](${artifactUrl})**\n`;
                body += `\`${artifactName}\` — available for 30 days\n\n`;
              }
              body += `**PR**: #${prNumber} · **Commit**: \`${{ github.sha }}\`\n\n`;
              body += `### Test Instructions:\n`;
              body += `\`\`\`bash\n# arm64 (most modern phones)\nadb install ebalistyka_android_arm64.apk\n# arm32 (older phones)\nadb install ebalistyka_android_armeabi_v7a.apk\n\`\`\`\n`;
            } else {
              body += `❌ **Build failed!**\n\n[View logs](${runUrl})\n`;
            }

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('## Android APK Build')
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (error) {
              console.log('Error posting comment:', error.message);
            }
