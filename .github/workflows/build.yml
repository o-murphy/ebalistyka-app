name: Build

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform"
        required: true
        type: string # linux | windows
      arch:
        description: "Target architecture"
        required: true
        type: string # amd64 | arm64
      build_type:
        description: "Build type"
        required: true
        type: string # release | debug
      build_name:
        description: "Version name (e.g. 0.1.0-alpha)"
        required: false
        type: string
        default: "0.1.0-alpha"
      retention_days:
        description: "Artifact retention in days"
        required: false
        type: number
        default: 30
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_url:
        description: "URL to download the artifact"
        value: ${{ jobs.build.outputs.artifact_url }}

  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "linux"
        type: choice
        options: [ linux, windows ]
      arch:
        description: "Target architecture"
        required: true
        default: "amd64"
        type: choice
        options: [ amd64, arm64 ]
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options: [ release, debug ]
      build_name:
        description: "Version name (e.g. 0.1.0-alpha)"
        required: false
        default: "0.1.0-alpha"
        type: string

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  build:
    name: ${{ inputs.platform }}-${{ inputs.arch }} (${{ inputs.build_type }})
    runs-on: ${{ (inputs.platform == 'linux' && inputs.arch == 'amd64' &&
      'ubuntu-latest') || (inputs.platform == 'linux' && inputs.arch == 'arm64'
      && 'ubuntu-24.04-arm') || (inputs.platform == 'windows' && inputs.arch ==
      'amd64' && 'windows-latest') || (inputs.platform == 'windows' &&
      inputs.arch == 'arm64' && 'windows-11-arm') }}
      
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_url: ${{ steps.artifact_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Flutter
        uses: ./.github/actions/flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux build dependencies
        if: inputs.platform == 'linux'
        shell: bash
        run: ./scripts/setup-linux-deps.sh

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          ARCH_SUFFIX=${{ inputs.arch == 'amd64' && 'x86_64' || 'aarch64' }}
          FLUTTER_ARCH=${{ inputs.arch == 'amd64' && 'x64' || 'arm64' }}
          echo "arch_suffix=$ARCH_SUFFIX"   >> $GITHUB_OUTPUT
          echo "flutter_arch=$FLUTTER_ARCH" >> $GITHUB_OUTPUT

          BCLIBC_HASH=$(git -C external/bclibc rev-parse HEAD)
          echo "bclibc_hash=$BCLIBC_HASH" >> $GITHUB_OUTPUT

          BCLIBC_FFI_HASH=$(git log -1 --format='%H' -- packages/bclibc_ffi 2>/dev/null || echo "unknown")
          echo "bclibc_ffi_hash=$BCLIBC_FFI_HASH" >> $GITHUB_OUTPUT

          BUILD_NAME="${{ inputs.build_name }}"
          # Remove prefix 'v'
          BUILD_NAME="${BUILD_NAME#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          echo "build_name=$BUILD_NAME"     >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

          if [ "${{ inputs.platform }}" = "linux" ]; then
            echo "bundle_dir=build/linux/${FLUTTER_ARCH}/${{ inputs.build_type }}/bundle" >> $GITHUB_OUTPUT
          else
            BUILD_SUBDIR=${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}
            echo "bundle_dir=build/windows/x64/runner/${BUILD_SUBDIR}" >> $GITHUB_OUTPUT
          fi

          echo "artifact_name=ebalistyka-${{ inputs.platform }}-${ARCH_SUFFIX}-${{ inputs.build_type }}-${BUILD_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Cache pub packages (Linux)
        if: inputs.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-linux-${{ inputs.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-linux-${{ inputs.arch }}-

      - name: Cache pub packages (Windows)
        if: inputs.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: pub-windows-${{ inputs.arch }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-windows-${{ inputs.arch }}-

      - name: Cache bclibc build
        uses: actions/cache@v4
        with:
          path: |
            build/${{ inputs.platform }}/${{ steps.meta.outputs.flutter_arch }}/bclibc_ffi_build
            packages/bclibc_ffi/build
          key: bclibc-${{ inputs.platform }}-${{ inputs.arch }}-${{
            steps.meta.outputs.bclibc_hash }}-${{
            steps.meta.outputs.bclibc_ffi_hash }}
          restore-keys: |
            bclibc-${{ inputs.platform }}-${{ inputs.arch }}-${{ steps.meta.outputs.bclibc_hash }}-
            bclibc-${{ inputs.platform }}-${{ inputs.arch }}-

      - name: Install Flutter dependencies
        shell: bash
        run: |
          flutter clean
          flutter pub get

      - name: Generate FFI bindings
        shell: bash
        run: |
          cd packages/bclibc_ffi
          dart run ffigen --config ffigen.yaml

      - name: Build bundle
        shell: bash
        run: flutter build ${{ inputs.platform }} --${{ inputs.build_type }}
          --build-name="${{ inputs.build_name }}" --build-number=${{
          github.run_number }}

      - name: Verify bundle
        shell: bash
        run: |
          bash scripts/verify-bundle.sh \
            "${{ steps.meta.outputs.bundle_dir }}" \
            "${{ inputs.platform }}"

      - name: Package Linux artifacts
        if: inputs.platform == 'linux'
        shell: bash
        run: |
          bash scripts/package-linux.sh \
            "${{ steps.meta.outputs.bundle_dir }}" \
            "${{ steps.meta.outputs.arch_suffix }}" \
            "${{ steps.meta.outputs.build_name }}" \
            "${{ steps.meta.outputs.build_number }}"

      - name: Package Windows artifacts
        if: inputs.platform == 'windows'
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 `
            -BundleDir "${{ steps.meta.outputs.bundle_dir }}" `
            -BuildName "${{ steps.meta.outputs.build_name }}" `
            -BuildNumber "${{ steps.meta.outputs.build_number }}" `
            -BuildType "${{ inputs.build_type }}"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          retention-days: ${{ inputs.retention_days || 30 }}
          if-no-files-found: error

      - name: Generate artifact URL
        id: artifact_url
        shell: bash
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "url=${RUN_URL}#artifacts" >> $GITHUB_OUTPUT
