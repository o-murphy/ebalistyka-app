name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v1.2.3       → full release
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.2.3-beta  → prerelease
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.6"

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        uses: ./.github/actions/version

  build-linux-amd64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: amd64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-linux-arm64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: arm64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-windows-amd64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: windows
      arch: amd64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1
    secrets:
      CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}

  build-android:
    needs: prepare-version
    name: Android APKs (release)
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: ./.github/actions/flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          BUILD_NAME="${{ needs.prepare-version.outputs.version }}"
          BUILD_NAME="${BUILD_NAME#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          echo "build_name=$BUILD_NAME"     >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "artifact_name=ebalistyka-android-release-${BUILD_NAME}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pub-cache
          key: pub-android-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-android-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install Flutter dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Set pubspec version
        run: |
          BASE=$(echo "${{ steps.meta.outputs.build_name }}" | sed 's/-.*//')
          NUM=${{ steps.meta.outputs.build_number }}
          sed -i "s/^version:.*/version: ${BASE}+${NUM}/" pubspec.yaml
          echo "pubspec version → ${BASE}+${NUM}"

      - name: Build APKs
        run: flutter build apk --release --split-per-abi

      - name: Package APKs
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   artifacts/ebalistyka_android_arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/ebalistyka_android_armeabi_v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      artifacts/ebalistyka_android_x86_64.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [prepare-version, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release
          find dl -type f \( \
            -name "*.tar.gz"      -o \
            -name "*.AppImage"    -o \
            -name "*.zsync"       -o \
            -name "*.zip"         -o \
            -name "*.msix"        -o \
            -name "*.appinstaller" -o \
            -name "*.cer" \
          \) -exec cp {} release/ \;

          echo "=== Release assets ==="
          ls -lh release/

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eBalistyka ${{ needs.prepare-version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: release/*
