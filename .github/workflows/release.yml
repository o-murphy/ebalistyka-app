name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v1.2.3       → full release
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.2.3-beta  → prerelease
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.6"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        uses: ./.github/actions/version

  build-linux-amd64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: amd64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-linux-arm64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: linux
      arch: arm64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-windows-amd64:
    needs: prepare-version
    uses: ./.github/workflows/build.yml
    with:
      platform: windows
      arch: amd64
      build_type: release
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1
    secrets:
      CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}

  build-android:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-apk.yml
    with:
      build_name: ${{ needs.prepare-version.outputs.version }}
      build_type: release
      retention_days: 1
    secrets:
      ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}

  build-android-aab:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-aab.yml
    with:
      build_name: ${{ needs.prepare-version.outputs.version }}
      build_type: release
      retention_days: 1
    secrets:
      ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}

  build-snap-amd64:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-snap.yml
    with:
      arch: amd64
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-snap-arm64:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-snap.yml
    with:
      arch: arm64
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-flatpak-amd64:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-flatpak.yml
    with:
      arch: amd64
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  build-flatpak-arm64:
    needs: prepare-version
    permissions:
      issues: write
      pull-requests: write
    uses: ./.github/workflows/build-flatpak.yml
    with:
      arch: arm64
      build_name: ${{ needs.prepare-version.outputs.version }}
      retention_days: 1

  release:
    needs: [prepare-version, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-android, build-android-aab, build-snap-amd64, build-snap-arm64, build-flatpak-amd64, build-flatpak-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release
          find dl -type f \( \
            -name "*.tar.gz"      -o \
            -name "*.AppImage"    -o \
            -name "*.zsync"       -o \
            -name "*.zip"         -o \
            -name "*.msix"        -o \
            -name "*.appinstaller" -o \
            -name "*.cer"         -o \
            -name "*.apk"         -o \
            -name "*.aab"         -o \
            -name "*.snap"        -o \
            -name "*.flatpak" \
          \) -exec cp {} release/ \;

          echo "=== Release assets ==="
          ls -lh release/

      - name: Extract changelog
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          V_RE="${VERSION//./\\.}"

          # Try version-specific section first (e.g. "## v1.2.3-beta.1" or "## v1.2.3 (date)")
          awk "/^## v?${V_RE}([[:space:]]|\$)/{found=1;next} /^\[!\[/{next} /^---$/{next} /^## /{if(found)exit} found{print}" \
            CHANGELOG.md | sed -e '/./,$!d' -e 's/[[:space:]]*$//' > /tmp/release_notes.md

          # Fall back to Unreleased if section not found or empty
          if [ ! -s /tmp/release_notes.md ]; then
            awk '/^## Unreleased/{found=1;next} /^\[!\[/{next} /^---$/{next} /^## /{if(found)exit} found{print}' \
              CHANGELOG.md | sed -e '/./,$!d' -e 's/[[:space:]]*$//' > /tmp/release_notes.md
          fi

          # Append compare link (previous tag → current tag)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "" >> /tmp/release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> /tmp/release_notes.md
          fi

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eBalistyka ${{ needs.prepare-version.outputs.version }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: release/*
