name: "Setup Flutter"
description: "Install Flutter SDK with caching support for Linux/Windows amd64/arm64"

inputs:
  flutter-version:
    description: "Flutter SDK version (e.g., \"3.41.6\", \"stable\", \"beta\", \"main\")"
    required: false
    default: "stable"
  cache:
    description: "Enable caching for Flutter SDK"
    required: false
    default: "true"

outputs:
  flutter-path:
    description: "Path to the installed Flutter SDK"
    value: ${{ steps.get-path.outputs.flutter-path }}

runs:
  using: "composite"
  steps:
    - name: Get Flutter path
      id: get-path
      shell: bash
      run: |
        echo "flutter-path=$RUNNER_TEMP/flutter" >> $GITHUB_OUTPUT

    - name: Resolve version and depth
      id: resolve-version
      shell: bash
      run: |
        VERSION="${{ inputs.flutter-version }}"
        case "$VERSION" in
          stable|beta|latest)
            echo "branch=${VERSION/latest/stable}" >> $GITHUB_OUTPUT
            echo "depth=1" >> $GITHUB_OUTPUT
            ;;
          main|master)
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "depth=50" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "branch=$VERSION" >> $GITHUB_OUTPUT
            echo "depth=1" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Cache Flutter SDK
      if: inputs.cache == 'true'
      id: cache-flutter
      uses: actions/cache@v4
      with:
        path: ${{ steps.get-path.outputs.flutter-path }}
        key: flutter-${{ runner.os }}-${{ runner.arch }}-${{
          steps.resolve-version.outputs.branch }}
        restore-keys: |
          flutter-${{ runner.os }}-${{ runner.arch }}-

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          curl git unzip xz-utils zip libglu1-mesa \
          clang cmake ninja-build pkg-config libgtk-3-dev \
          liblzma-dev libstdc++-12-dev

    - name: Clone Flutter
      if: steps.cache-flutter.outputs.cache-hit != 'true'
      shell: bash
      run: |
        TARGET_DIR="${{ steps.get-path.outputs.flutter-path }}"

        # Важливо: на Windows перетворюємо шлях для git clone, щоб він був зрозумілий для Windows-версії git
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Видаляємо можливий лідируючий слеш і замінюємо прямі слеші на зворотні для надійності, 
          # або використовуємо формат, який git-bash точно зрозуміє
          mkdir -p "$TARGET_DIR"
          cd "$TARGET_DIR"
          cd ..
          TARGET_DIR_FINAL=$(pwd -W | sed 's/\//\\/g')/flutter
        else
          TARGET_DIR_FINAL="$TARGET_DIR"
        fi

        echo "Cloning Flutter [${{ steps.resolve-version.outputs.branch }}] into $TARGET_DIR_FINAL..."
        git clone --depth ${{ steps.resolve-version.outputs.depth }} \
          --branch ${{ steps.resolve-version.outputs.branch }} \
          https://github.com/flutter/flutter.git "$TARGET_DIR"

    - name: Setup Environment Variables
      shell: bash
      run: |
        FLUTTER_PATH="${{ steps.get-path.outputs.flutter-path }}"

        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Перетворюємо шлях на абсолютний Windows шлях через 'pwd -W'
          cd "$FLUTTER_PATH" || mkdir -p "$FLUTTER_PATH" && cd "$FLUTTER_PATH"
          FLUTTER_PATH=$(pwd -W | sed 's/\//\\/g')
          echo "PUB_CACHE=${RUNNER_TEMP}\\pub-cache" >> $GITHUB_ENV
        fi

        echo "$FLUTTER_PATH/bin" >> $GITHUB_PATH
        echo "FLUTTER_HOME=$FLUTTER_PATH" >> $GITHUB_ENV
        echo "FLUTTER_ROOT=$FLUTTER_PATH" >> $GITHUB_ENV

    - name: Verify and Precache (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        export PATH="${{ steps.get-path.outputs.flutter-path }}/bin:$PATH"
        flutter --version
        flutter doctor
        flutter precache

    - name: Verify and Precache (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $flutterHome = $env:FLUTTER_HOME
        $binPath = Join-Path $flutterHome "bin"

        Write-Host "Debug: Checking path $binPath"
        if (Test-Path $binPath) {
            Write-Host "Directory exists. Listing contents:"
            Get-ChildItem $binPath | Select-Object -First 10 Name
        } else {
            Write-Warning "Directory $binPath does not exist!"
            Write-Host "Checking parent directory:"
            $parent = Split-Path $binPath
            if (Test-Path $parent) { Get-ChildItem $parent }
        }

        # Додаємо до Path для поточного кроку
        $env:Path = "$binPath;" + $env:Path

        $flutterBat = Join-Path $binPath "flutter.bat"
        if (Test-Path $flutterBat) {
          & $flutterBat --version
          & $flutterBat doctor
          & $flutterBat precache
        } else {
          Write-Error "Flutter executable not found at $flutterBat."
          exit 1
        }
