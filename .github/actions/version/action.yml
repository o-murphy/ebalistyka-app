name: "Resolve version"
description: "Extracts version from tag (v1.2.3 → 1.2.3) or returns a default for non-tag runs"

inputs:
  default:
    description: "Fallback version suffix when not running on a tag (ignored if pubspec.yaml is present)"
    required: false
    default: "dev"

outputs:
  version:
    description: "Resolved version string (without leading v)"
    value: ${{ steps.resolve.outputs.version }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${{ github.ref_name }}"
          [[ "${VERSION}" == v* ]] && VERSION="${VERSION:1}"
        else
          # Read base version from pubspec.yaml so non-tag builds reflect current code
          PUBSPEC=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | sed 's/+.*//')
          VERSION="${PUBSPEC}-${{ inputs.default }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Resolved version: ${VERSION}"
